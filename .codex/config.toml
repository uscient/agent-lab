# Project-scoped Codex config — agent-lab. Security doctrine: AGENTS.md (read natively).
# Default posture: read-only / plan. Edit only when told.
approval_policy = "on-request"
sandbox_mode    = "read-only"
web_search      = "cached"
project_root_markers = ["AGENTS.md", "compose.yaml", ".git"]

# Opt-in editing when instructed:  codex --profile edit
[profiles.edit]
approval_policy = "on-request"
sandbox_mode    = "workspace-write"

[profiles.edit.sandbox_workspace_write]
writable_roots = ["."]
network_access = false
# .git and .codex are auto-protected. Do NOT edit .claude / .grok / .devguard,
# .env*, or secrets/ — off-limits by AGENTS.md + the mutation policy.
# If your Codex version supports custom protected paths, add those dirs there.

[profiles.ci]
approval_policy = "never"
sandbox_mode    = "read-only"
